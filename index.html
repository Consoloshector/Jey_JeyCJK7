<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>The Riddle Purse — Ultimate Edition</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --gold:#c59b47;
    --paper:#efe0bc;
    --dark:#090705;
    --blood:#7d1020;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:
    radial-gradient(circle at center,#221811 0%,#0b0806 100%);
    min-height:100vh;
    font-family:'Playfair Display',serif;
    color:#fff;
}

/* ========================= */
/* CINEMATIC OVERLAY */
/* ========================= */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.015),
        rgba(255,255,255,.015) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events:none;
    mix-blend-mode:soft-light;
    animation:flicker .2s infinite;
    z-index:9999;
}

@keyframes flicker{
    0%{opacity:.8;}
    50%{opacity:1;}
    100%{opacity:.85;}
}

/* ========================= */
/* DUST PARTICLES */
/* ========================= */

.particle{
    position:absolute;
    width:2px;
    height:2px;
    background:rgba(255,220,120,.6);
    border-radius:50%;
    animation:floatDust linear infinite;
}

@keyframes floatDust{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    10%{
        opacity:1;
    }
    to{
        transform:translateY(-100vh);
        opacity:0;
    }
}

/* ========================= */
/* INTRO */
/* ========================= */

.gateway{
    position:fixed;
    inset:0;
    background:#050403;
    z-index:500;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:1s;
}

.gateway.hidden{
    opacity:0;
    pointer-events:none;
}

.intro-box{
    width:320px;
    text-align:center;
    padding:30px;
}

.symbol{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    border:1px solid rgba(197,155,71,.3);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    color:var(--gold);
    margin-bottom:30px;
    box-shadow:0 0 40px rgba(197,155,71,.2);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

.start-btn{
    margin-top:30px;
    width:100%;
    padding:14px;
    background:linear-gradient(to right,#2a180c,#4a2d17);
    border:none;
    color:#f5deb0;
    letter-spacing:4px;
    cursor:pointer;
    transition:.3s;
    font-weight:bold;
}

.start-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* ========================= */
/* HEADER */
/* ========================= */

.header{
    position:absolute;
    top:30px;
    width:100%;
    text-align:center;
    z-index:100;
    opacity:0;
    transform:translateY(20px);
    transition:1s;
}

.header.show{
    opacity:1;
    transform:translateY(0);
}

.header h1{
    font-family:'Cinzel',serif;
    font-size:28px;
    letter-spacing:6px;
    color:#f7e8c7;
}

.header p{
    color:#999;
    margin-top:10px;
    font-size:12px;
    letter-spacing:2px;
}

/* ========================= */
/* MAIN WRAPPER */
/* ========================= */

.wrapper{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:1800px;
}

/* ========================= */
/* PURSE */
/* ========================= */

.purse{
    position:relative;
    width:360px;
    height:360px;
    opacity:0;
    transform:scale(.5) rotateX(40deg);
    transition:1.2s;
}

.purse.show{
    opacity:1;
    transform:scale(1) rotateX(0deg);
}

.center{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
}

.heart{
    position:relative;
    width:140px;
    height:140px;
}

.leftHeart,
.rightHeart{
    position:absolute;
    width:50%;
    height:100%;
    background:var(--blood);
    transition:1.8s cubic-bezier(.76,0,.24,1);
}

.leftHeart{
    left:0;
    clip-path:path('M 64,35 C 64,12 40,0 18,0 C -4,0 -4,30 18,52 C 35,70 53,95 64,115 L 64,115 Z');
}

.rightHeart{
    right:0;
    clip-path:path('M 0,35 C 0,12 24,0 46,0 C 68,0 68,30 46,52 C 29,70 11,95 0,115 L 0,115 Z');
}

.leftHeart.split{
    transform:translateX(-220%) rotate(-35deg) scale(.7);
    opacity:0;
}

.rightHeart.split{
    transform:translateX(220%) rotate(35deg) scale(.7);
    opacity:0;
}

.heartText{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#f3d5d5;
    letter-spacing:4px;
    font-size:11px;
}

/* ========================= */
/* FLAPS */
/* ========================= */

.flap{
    position:absolute;
    inset:0;
    cursor:pointer;
    transition:
    transform 1.4s cubic-bezier(.25,1,.5,1),
    opacity 1.2s,
    background .3s;
    backface-visibility:hidden;
    will-change:transform;
}

.flap:hover{
    filter:brightness(1.05);
}

.top{
    background:#e7d7b1;
    clip-path:polygon(0 0,100% 0,50% 50%);
    transform-origin:top;
}

.right{
    background:#d8c79e;
    clip-path:polygon(100% 0,100% 100%,50% 50%);
    transform-origin:right;
}

.bottom{
    background:#e7d7b1;
    clip-path:polygon(0 100%,100% 100%,50% 50%);
    transform-origin:bottom;
}

.left{
    background:#d8c79e;
    clip-path:polygon(0 0,0 100%,50% 50%);
    transform-origin:left;
}

.flap.done.top{
    transform:rotateX(-170deg);
    opacity:0;
}

.flap.done.right{
    transform:rotateY(170deg);
    opacity:0;
}

.flap.done.bottom{
    transform:rotateX(170deg);
    opacity:0;
}

.flap.done.left{
    transform:rotateY(-170deg);
    opacity:0;
}

.flap.active{
    background:#f7e48f;
}

.flap.error{
    animation:shake .4s;
    background:#ef4444!important;
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    50%{transform:translateX(8px);}
    75%{transform:translateX(-8px);}
}

/* ========================= */
/* LETTER */
/* ========================= */

.letterWrap{
    width:420px;
    max-width:95%;
    opacity:0;
    transform:translateY(50px) scale(.9);
    transition:1.5s;
    display:none;
}

.letterWrap.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.scroll{
    background:var(--paper);
    color:#2a1b10;
    padding:40px;
    line-height:2;
    box-shadow:0 30px 80px rgba(0,0,0,.7);
    border:2px solid rgba(0,0,0,.1);
    position:relative;
}

.scroll::before,
.scroll::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    border-left:1px dashed rgba(0,0,0,.1);
}

.scroll::before{left:10px;}
.scroll::after{right:10px;}

.typewriter{
    white-space:pre-wrap;
    font-style:italic;
}

.nextBtn{
    margin-top:30px;
    width:100%;
    padding:14px;
    border:none;
    background:#2c1809;
    color:#f3ddb0;
    letter-spacing:4px;
    cursor:pointer;
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:500px){

    .purse{
        width:300px;
        height:300px;
    }

    .header h1{
        font-size:20px;
    }

}

</style>
</head>

<body>

<!-- DUST -->
<div id="particles"></div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- INTRO -->
<div class="gateway" id="gateway">

    <div class="intro-box">

        <div class="symbol">
            ⏳
        </div>

        <h2 style="letter-spacing:6px;font-family:Cinzel;">ZAMAN KAPSULU</h2>

        <p style="margin-top:20px;color:#777;font-size:13px;line-height:1.8;">
            Viktoriya dövründən ilham alınaraq hazırlanmış ikiqat mexaniki şifrəli rəqəmsal artefakt.
        </p>

        <button class="start-btn" onclick="startExperience()">
            MƏKTUBU QƏBUL ET
        </button>

    </div>

</div>

<!-- HEADER -->
<div class="header" id="header">

    <h1 id="stageTitle">
        THE RIDDLE PURSE
    </h1>

    <p id="stageDesc">
        İlk gizli kombinasiyanı tapın.
    </p>

</div>

<!-- MAIN -->
<div class="wrapper">

    <!-- PURSE -->
    <div class="purse" id="purse">

        <div class="center">

            <div class="heart">

                <div class="leftHeart" id="leftHeart"></div>

                <div class="rightHeart" id="rightHeart"></div>

                <div class="heartText">
                    JEY JEY
                </div>

            </div>

        </div>

        <div class="flap top" data-id="1"></div>
        <div class="flap right" data-id="2"></div>
        <div class="flap bottom" data-id="3"></div>
        <div class="flap left" data-id="4"></div>

    </div>

    <!-- LETTER -->
    <div class="letterWrap" id="letterWrap">

        <div class="scroll">

            <div class="typewriter" id="letter"></div>

            <button class="nextBtn" id="nextBtn" style="display:none;">
                NÖVBƏTİ MƏRHƏLƏ
            </button>

        </div>

    </div>

</div>

<script>

/* ========================= */
/* HELPERS */
/* ========================= */

const $ = e => document.getElementById(e);

const vibrate = ms => {
    if(navigator.vibrate){
        navigator.vibrate(ms);
    }
};

/* ========================= */
/* PARTICLES */
/* ========================= */

for(let i=0;i<50;i++){

    const p = document.createElement('div');

    p.className='particle';

    p.style.left=Math.random()*100+'vw';

    p.style.animationDuration=
    10 + Math.random()*20 + 's';

    p.style.animationDelay=
    Math.random()*10 + 's';

    p.style.opacity=Math.random();

    $('particles').appendChild(p);
}

/* ========================= */
/* AUDIO */
/* ========================= */

const music = $('bgMusic');

function fadeAudio(target,duration=2000){

    let step = (target - music.volume)/(duration/50);

    const interval = setInterval(()=>{

        music.volume += step;

        if(
            (step > 0 && music.volume >= target) ||
            (step < 0 && music.volume <= target)
        ){
            music.volume = target;
            clearInterval(interval);
        }

    },50);
}

/* ========================= */
/* STAGES */
/* ========================= */

const stages = [

{
    combo:[1,4,2,3],

    text:
`Hörmətli Jey Jey xanım,

İlk mexaniki kilid uğurla açıldı.

Lakin bu artefakt yalnız bir təbəqədən ibarət deyil. Həqiqi mesaj daha dərin qatlarda gizlədilib.

Əgər davam etməyə hazırsınızsa, növbəti mərhələyə keçin.`
},

{
    combo:[4,1,3,2],

    text:
`Təbriklər.

Görünür bütün mexaniki şifrələr uğurla qırıldı.

Bu rəqəmsal məktub sadəcə adi bir mesaj deyil — vaxtdan kənar kiçik bir təcrübə idi.

Bütün mərhələləri tamamladığınız üçün təşəkkürlər.

Missiya tamamlandı.`
}

];

let stage = 0;
let progress = [];
let locked = false;

/* ========================= */
/* START */
/* ========================= */

function startExperience(){

    $('gateway').classList.add('hidden');

    music.volume = 0;

    music.play().catch(()=>{});

    fadeAudio(.4);

    setTimeout(()=>{

        $('header').classList.add('show');

        $('purse').classList.add('show');

    },800);

}

/* ========================= */
/* FLAPS */
/* ========================= */

document.querySelectorAll('.flap').forEach(el=>{

    el.addEventListener('click',()=>{

        if(locked) return;

        if(el.classList.contains('done')) return;

        const id = Number(el.dataset.id);

        handleInput(id,el);

    });

});

/* ========================= */
/* INPUT */
/* ========================= */

function handleInput(id,element){

    element.classList.add('active');

    progress.push(id);

    vibrate(20);

    const needed = stages[stage].combo;

    const currentIndex = progress.length - 1;

    if(progress[currentIndex] !== needed[currentIndex]){

        errorSequence();

        return;
    }

    if(progress.length === needed.length){

        successSequence();

    }

}

/* ========================= */
/* ERROR */
/* ========================= */

function errorSequence(){

    locked = true;

    vibrate([100,50,100]);

    document.querySelectorAll('.flap').forEach(el=>{

        el.classList.add('error');

        el.classList.remove('active');

    });

    setTimeout(()=>{

        document.querySelectorAll('.flap').forEach(el=>{

            el.classList.remove('error');

        });

        progress=[];

        locked=false;

    },500);

}

/* ========================= */
/* SUCCESS */
/* ========================= */

function successSequence(){

    locked=true;

    document.querySelectorAll('.flap').forEach(el=>{

        el.classList.add('done');

    });

    setTimeout(()=>{

        $('leftHeart').classList.add('split');

        $('rightHeart').classList.add('split');

    },1200);

    setTimeout(()=>{

        $('purse').style.opacity='0';

        $('purse').style.transform='scale(.7) rotateX(80deg)';

    },2500);

    setTimeout(()=>{

        $('purse').style.display='none';

        showLetter();

    },3500);

}

/* ========================= */
/* LETTER */
/* ========================= */

function showLetter(){

    $('letterWrap').style.display='block';

    setTimeout(()=>{

        $('letterWrap').classList.add('show');

    },50);

    typeWriter(
        $('letter'),
        stages[stage].text
    );

}

/* ========================= */
/* TYPEWRITER */
/* ========================= */

function typeWriter(el,text){

    el.innerHTML='';

    let i=0;

    const interval = setInterval(()=>{

        el.innerHTML += text[i];

        i++;

        if(i>=text.length){

            clearInterval(interval);

            if(stage === 0){

                $('nextBtn').style.display='block';

            }

        }

    },25);

}

/* ========================= */
/* NEXT STAGE */
/* ========================= */

$('nextBtn').onclick = ()=>{

    $('nextBtn').style.display='none';

    $('letterWrap').classList.remove('show');

    setTimeout(()=>{

        $('letterWrap').style.display='none';

        $('letter').innerHTML='';

        nextStage();

    },1000);

};

function nextStage(){

    stage=1;

    progress=[];

    locked=false;

    $('stageTitle').innerHTML='THE RIDDLE PURSE II';

    $('stageDesc').innerHTML='Son gizli kombinasiyanı tapın.';

    document.querySelectorAll('.flap').forEach(el=>{

        el.classList.remove('done','active');

    });

    $('leftHeart').classList.remove('split');

    $('rightHeart').classList.remove('split');

    $('purse').style.display='block';

    setTimeout(()=>{

        $('purse').style.opacity='1';

        $('purse').style.transform='scale(1) rotateX(0deg)';

    },50);

}

</script>

</body>
</html>
