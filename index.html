<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Riddle Purse — Victorian Grandmaster Edition</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>

:root{
    --gold:#c49b4d;
    --paper:#efe2bf;
    --dark:#080604;
    --blood:#821628;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    min-height:100vh;
    background:
    radial-gradient(circle at center,#211710 0%,#090604 100%);
    font-family:'Playfair Display',serif;
    color:white;
}

/* ===================================== */
/* OLD FILM EFFECT */
/* ===================================== */

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.02),
        rgba(255,255,255,.02) 1px,
        transparent 1px,
        transparent 3px
    );
    mix-blend-mode:soft-light;
    opacity:.45;
    z-index:9999;
    animation:flicker .15s infinite;
}

@keyframes flicker{
    0%{opacity:.35;}
    50%{opacity:.5;}
    100%{opacity:.4;}
}

/* ===================================== */
/* DUST */
/* ===================================== */

.dust{
    position:absolute;
    width:2px;
    height:2px;
    background:rgba(255,223,150,.8);
    border-radius:50%;
    pointer-events:none;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* ===================================== */
/* INTRO */
/* ===================================== */

.gateway{
    position:fixed;
    inset:0;
    background:#060403;
    z-index:500;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:1.5s;
}

.gateway.hidden{
    opacity:0;
    pointer-events:none;
}

.gateway-box{
    width:350px;
    text-align:center;
}

.clock{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    border:1px solid rgba(196,155,77,.3);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    color:var(--gold);
    box-shadow:
    0 0 50px rgba(196,155,77,.15),
    inset 0 0 30px rgba(196,155,77,.08);
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

.gateway h1{
    margin-top:35px;
    letter-spacing:8px;
    font-size:20px;
    color:#f2dfb7;
    font-family:'Cinzel',serif;
}

.gateway p{
    margin-top:20px;
    line-height:2;
    color:#7d776c;
    font-size:13px;
}

.start-btn{
    margin-top:35px;
    width:100%;
    padding:15px;
    background:
    linear-gradient(
        to right,
        #2b180b,
        #4d2d16
    );
    border:1px solid rgba(196,155,77,.2);
    color:#f7e4b7;
    letter-spacing:5px;
    cursor:pointer;
    transition:.4s;
}

.start-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 15px 40px rgba(0,0,0,.6);
}

/* ===================================== */
/* HEADER */
/* ===================================== */

.header{
    position:absolute;
    top:35px;
    width:100%;
    text-align:center;
    z-index:50;
    opacity:0;
    transform:translateY(20px);
    transition:1s;
}

.header.show{
    opacity:1;
    transform:translateY(0);
}

.header h2{
    font-family:'Cinzel',serif;
    letter-spacing:8px;
    color:#f3dfb2;
    font-size:28px;
}

.header p{
    margin-top:10px;
    color:#7e7465;
    font-size:12px;
    letter-spacing:3px;
}

/* ===================================== */
/* MAIN */
/* ===================================== */

.main{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:2200px;
}

/* ===================================== */
/* PURSE */
/* ===================================== */

.purse{
    width:380px;
    height:380px;
    position:relative;
    transform-style:preserve-3d;
    opacity:0;
    transform:scale(.5) rotateX(50deg);
    transition:1.5s;
}

.purse.show{
    opacity:1;
    transform:scale(1) rotateX(0);
}

.core{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
}

.heart{
    width:150px;
    height:150px;
    position:relative;
}

.left-heart,
.right-heart{
    position:absolute;
    width:50%;
    height:100%;
    background:var(--blood);
    transition:2s cubic-bezier(.76,0,.24,1);
    box-shadow:inset 0 0 20px rgba(0,0,0,.4);
}

.left-heart{
    left:0;
    clip-path:path('M 64,35 C 64,12 40,0 18,0 C -4,0 -4,30 18,52 C 35,70 53,95 64,115 L 64,115 Z');
}

.right-heart{
    right:0;
    clip-path:path('M 0,35 C 0,12 24,0 46,0 C 68,0 68,30 46,52 C 29,70 11,95 0,115 L 0,115 Z');
}

.left-heart.split{
    transform:
    translateX(-250%)
    rotate(-40deg)
    scale(.6);
    opacity:0;
}

.right-heart.split{
    transform:
    translateX(250%)
    rotate(40deg)
    scale(.6);
    opacity:0;
}

.heart-text{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    letter-spacing:5px;
    color:#f5dada;
    font-size:11px;
}

/* ===================================== */
/* FLAPS */
/* ===================================== */

.flap{
    position:absolute;
    inset:0;
    cursor:pointer;
    transition:
    transform 1.6s cubic-bezier(.25,1,.5,1),
    opacity 1.3s,
    background .4s;
    backface-visibility:hidden;
    will-change:transform;
}

.flap::after{
    content:"";
    position:absolute;
    inset:12px;
    border:1px dashed rgba(91,58,19,.2);
}

.top{
    background:#e5d4ab;
    clip-path:polygon(0 0,100% 0,50% 50%);
    transform-origin:top;
}

.right{
    background:#d8c79e;
    clip-path:polygon(100% 0,100% 100%,50% 50%);
    transform-origin:right;
}

.bottom{
    background:#e5d4ab;
    clip-path:polygon(0 100%,100% 100%,50% 50%);
    transform-origin:bottom;
}

.left{
    background:#d8c79e;
    clip-path:polygon(0 0,0 100%,50% 50%);
    transform-origin:left;
}

.top.done{
    transform:rotateX(-170deg);
    opacity:0;
}

.right.done{
    transform:rotateY(170deg);
    opacity:0;
}

.bottom.done{
    transform:rotateX(170deg);
    opacity:0;
}

.left.done{
    transform:rotateY(-170deg);
    opacity:0;
}

.flap.active{
    background:#f7e38f;
}

.flap.error{
    animation:shake .4s;
    background:#b72828!important;
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    50%{transform:translateX(8px);}
    75%{transform:translateX(-8px);}
}

/* ===================================== */
/* LETTER */
/* ===================================== */

.letter-wrap{
    width:450px;
    max-width:95%;
    opacity:0;
    transform:translateY(50px) scale(.9);
    transition:1.4s;
    display:none;
}

.letter-wrap.show{
    opacity:1;
    transform:translateY(0) scale(1);
}

.scroll{
    background:var(--paper);
    color:#2d1a0d;
    padding:50px;
    position:relative;
    box-shadow:0 30px 80px rgba(0,0,0,.7);
}

.scroll::before,
.scroll::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    border-left:1px dashed rgba(0,0,0,.1);
}

.scroll::before{left:12px;}
.scroll::after{right:12px;}

.letter-title{
    font-family:'Cinzel',serif;
    margin-bottom:25px;
    letter-spacing:3px;
    color:#6a4821;
}

.letter{
    line-height:2.1;
    font-style:italic;
    white-space:pre-wrap;
}

.riddle{
    margin-top:35px;
    padding:20px;
    border:1px dashed rgba(0,0,0,.2);
    background:rgba(0,0,0,.03);
    font-size:14px;
}

.next-btn{
    width:100%;
    padding:15px;
    margin-top:30px;
    background:#2b180b;
    color:#f5ddb1;
    border:none;
    cursor:pointer;
    letter-spacing:4px;
}

@media(max-width:500px){

    .purse{
        width:310px;
        height:310px;
    }

    .header h2{
        font-size:20px;
    }

}

</style>
</head>

<body>

<!-- DUST -->
<div id="dustContainer"></div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- INTRO -->
<div class="gateway" id="gateway">

    <div class="gateway-box">

        <div class="clock">⏳</div>

        <h1>ZAMAN KAPSULU</h1>

        <p>
            19-cu əsrin estetikası ilə hazırlanmış
            ikiqat mexaniki şifrəli rəqəmsal artefakt.
        </p>

        <button class="start-btn" onclick="startExperience()">
            MƏKTUBU QƏBUL ET
        </button>

    </div>

</div>

<!-- HEADER -->
<div class="header" id="header">

    <h2 id="stageTitle">
        THE RIDDLE PURSE
    </h2>

    <p id="stageDesc">
        İlk kombinasiyanı düzgün yığın.
    </p>

</div>

<!-- MAIN -->
<div class="main">

    <!-- PURSE -->
    <div class="purse" id="purse">

        <div class="core">

            <div class="heart">

                <div class="left-heart" id="leftHeart"></div>

                <div class="right-heart" id="rightHeart"></div>

                <div class="heart-text">
                    JEY JEY
                </div>

            </div>

        </div>

        <div class="flap top" data-id="1"></div>
        <div class="flap right" data-id="2"></div>
        <div class="flap bottom" data-id="3"></div>
        <div class="flap left" data-id="4"></div>

    </div>

    <!-- LETTER -->
    <div class="letter-wrap" id="letterWrap">

        <div class="scroll">

            <div class="letter-title">
                Hörmətli Jey Jey xanım,
            </div>

            <div class="letter" id="letter"></div>

            <!-- TAPMACA -->
            <div class="riddle" id="riddleBox" style="display:none;">

                <strong>Tapmaca:</strong>

                <br><br>

                “Mən danışmadan cavab verirəm.
                Mənim səsim yoxdur,
                amma hər kəs məni eşidir.
                Mən kiməm?”

                <br><br>

                <input
                id="riddleInput"
                placeholder="Cavabı yaz..."
                style="
                width:100%;
                padding:12px;
                border:none;
                outline:none;
                background:#fff7e7;
                margin-top:10px;
                ">

                <button
                onclick="checkRiddle()"
                style="
                margin-top:15px;
                width:100%;
                padding:12px;
                border:none;
                background:#2c1809;
                color:#f5ddb1;
                cursor:pointer;
                letter-spacing:3px;
                ">
                    TAPMACANI AÇ
                </button>

            </div>

            <button class="next-btn" id="nextBtn" style="display:none;">
                NÖVBƏTİ MƏRHƏLƏ
            </button>

        </div>

    </div>

</div>

<script>

const $ = id => document.getElementById(id);

/* ===================================== */
/* DUST */
/* ===================================== */

for(let i=0;i<70;i++){

    const d = document.createElement('div');

    d.className='dust';

    d.style.left=Math.random()*100+'vw';

    d.style.animationDuration=
    10 + Math.random()*20 + 's';

    d.style.animationDelay=
    Math.random()*10 + 's';

    $('dustContainer').appendChild(d);

}

/* ===================================== */
/* AUDIO */
/* ===================================== */

const music = $('bgMusic');

function fadeAudio(target,duration=2000){

    let step =
    (target - music.volume)/(duration/50);

    const interval = setInterval(()=>{

        music.volume += step;

        if(
            (step > 0 && music.volume >= target) ||
            (step < 0 && music.volume <= target)
        ){
            music.volume = target;
            clearInterval(interval);
        }

    },50);

}

/* ===================================== */
/* STAGES */
/* ===================================== */

const stages = [

{
combo:[1,4,2,3],

text:
`İlk mexaniki kilid uğurla açıldı.

Lakin əsas sirr hələ qarşıdadır.

Köhnə dövr sənətkarları həqiqi məktubları
heç vaxt ilk qatda gizlətmirdilər.

Növbəti mərhələyə keçmək üçün əvvəlcə
tapmacanı həll etməlisiniz.`
},

{
combo:[4,1,3,2],

text:
`Təbriklər.

Bütün şifrələr və mexaniki kilidlər
uğurla qırıldı.

Bu məktub sadəcə mesaj deyil,
vaxtdan kənar kiçik bir təcrübə idi.

Missiya tamamlandı.`
}

];

let stage = 0;
let progress = [];
let locked = false;

/* ===================================== */
/* START */
/* ===================================== */

function startExperience(){

    $('gateway').classList.add('hidden');

    music.volume=0;

    music.play().catch(()=>{});

    fadeAudio(.4);

    setTimeout(()=>{

        $('header').classList.add('show');

        $('purse').classList.add('show');

    },800);

}

/* ===================================== */
/* INPUT */
/* ===================================== */

document.querySelectorAll('.flap').forEach(el=>{

    el.addEventListener('click',()=>{

        if(locked) return;

        if(el.classList.contains('done')) return;

        const id = Number(el.dataset.id);

        input(id,el);

    });

});

function input(id,element){

    element.classList.add('active');

    progress.push(id);

    const combo = stages[stage].combo;

    const index = progress.length - 1;

    if(progress[index] !== combo[index]){

        errorSequence();
        return;

    }

    if(progress.length === combo.length){

        successSequence();

    }

}

/* ===================================== */
/* ERROR */
/* ===================================== */

function errorSequence(){

    locked=true;

    navigator.vibrate?.([100,50,100]);

    document.querySelectorAll('.flap').forEach(el=>{

        el.classList.add('error');
        el.classList.remove('active');

    });

    setTimeout(()=>{

        document.querySelectorAll('.flap').forEach(el=>{

            el.classList.remove('error');

        });

        progress=[];

        locked=false;

    },500);

}

/* ===================================== */
/* SUCCESS */
/* ===================================== */

function successSequence(){

    locked=true;

    document.querySelectorAll('.flap').forEach(el=>{

        el.classList.add('done');

    });

    setTimeout(()=>{

        $('leftHeart').classList.add('split');
        $('rightHeart').classList.add('split');

    },1000);

    setTimeout(()=>{

        $('purse').style.opacity='0';
        $('purse').style.transform='scale(.7) rotateX(80deg)';

    },2400);

    setTimeout(()=>{

        $('purse').style.display='none';

        showLetter();

    },3300);

}

/* ===================================== */
/* LETTER */
/* ===================================== */

function showLetter(){

    $('letterWrap').style.display='block';

    setTimeout(()=>{

        $('letterWrap').classList.add('show');

    },50);

    typeWriter(
        $('letter'),
        stages[stage].text
    );

}

function typeWriter(el,text){

    el.innerHTML='';

    let i=0;

    const interval = setInterval(()=>{

        el.innerHTML += text[i];

        i++;

        if(i >= text.length){

            clearInterval(interval);

            if(stage===0){

                $('riddleBox').style.display='block';

            }

        }

    },25);

}

/* ===================================== */
/* RIDDLE */
/* ===================================== */

function checkRiddle(){

    const val =
    $('riddleInput')
    .value
    .toLowerCase()
    .trim();

    if(
        val === 'echo' ||
        val === 'əks-səda' ||
        val === 'eks seda'
    ){

        $('nextBtn').style.display='block';

        $('riddleBox').innerHTML=
        `
        <div style="color:#2f5f1e;font-weight:bold;">
        Tapmaca uğurla həll edildi.
        </div>
        `;

    }else{

        $('riddleInput').style.background='#fca5a5';

        setTimeout(()=>{

            $('riddleInput').style.background='#fff7e7';

        },500);

    }

}

/* ===================================== */
/* NEXT */
/* ===================================== */

$('nextBtn').onclick = ()=>{

    $('nextBtn').style.display='none';

    $('letterWrap').classList.remove('show');

    setTimeout(()=>{

        $('letterWrap').style.display='none';

        $('riddleBox').style.display='none';

        nextStage();

    },1000);

};

function nextStage(){

    stage=1;

    progress=[];

    locked=false;

    $('stageTitle').innerHTML=
    'THE RIDDLE PURSE II';

    $('stageDesc').innerHTML=
    'Son kombinasiyanı düzgün yığın.';

    document.querySelectorAll('.flap').forEach(el=>{

        el.classList.remove('done','active');

    });

    $('leftHeart').classList.remove('split');
    $('rightHeart').classList.remove('split');

    $('purse').style.display='block';

    setTimeout(()=>{

        $('purse').style.opacity='1';

        $('purse').style.transform=
        'scale(1) rotateX(0deg)';

    },50);

}

</script>

</body>
</html>
